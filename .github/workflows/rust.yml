name: Rust CI

on:
  push:
    branches: [ "rust-implementation" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "rust-implementation" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Add target
      run: rustup target add x86_64-unknown-linux-gnu
    - name: Build
      run: cargo build --target x86_64-unknown-linux-gnu --release --verbose
      working-directory: client_rust
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: client_rust-x86_64-unknown-linux-gnu
        path: client_rust/target/x86_64-unknown-linux-gnu/release/client_rust

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: cargo build --release --verbose
      working-directory: client_rust
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: client_rust-x86_64-pc-windows-msvc
        path: client_rust/target/release/client_rust.exe

  # macOS build (only on tags or manual dispatch — slow runner)
  build-macos:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: cargo build --release --verbose
      working-directory: client_rust
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: client_rust-macos
        path: client_rust/target/release/client_rust

  # Attach binaries to the GitHub release (only on version tags)
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: client_rust-x86_64-unknown-linux-gnu
        path: artifacts/linux
    - uses: actions/download-artifact@v4
      with:
        name: client_rust-x86_64-pc-windows-msvc
        path: artifacts/windows
    - uses: actions/download-artifact@v4
      with:
        name: client_rust-macos
        path: artifacts/macos
    - name: Rename binaries
      run: |
        mv artifacts/linux/client_rust  artifacts/client_rust-linux-x86_64
        mv artifacts/windows/client_rust.exe artifacts/client_rust-windows-x86_64.exe
        mv artifacts/macos/client_rust   artifacts/client_rust-macos
        chmod +x artifacts/client_rust-linux-x86_64 artifacts/client_rust-macos
    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload ${{ github.ref_name }} \
          artifacts/client_rust-linux-x86_64 \
          artifacts/client_rust-windows-x86_64.exe \
          artifacts/client_rust-macos \
          --repo ${{ github.repository }} --clobber
