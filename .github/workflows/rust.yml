name: Rust CI

on:
  push:
    branches: [ "rust-implementation" ]
  pull_request:
    branches: [ "rust-implementation" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
      working-directory: client_rust
    - name: Run tests
      run: cargo test --verbose
      working-directory: client_rust
      if: runner.os != 'Windows' # Skip tests requiring complex env on windows CI for now
