when:
  - event: push
    branch: [rust-implementation, main]
  - event: manual

steps:
  build:
    image: docker:28-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker build -f telegram_bot/Dockerfile -t hamrah-bot:latest .
      - docker tag hamrah-bot:latest hamrah-bot:${CI_COMMIT_SHA:0:8}

  deploy:
    image: docker:28-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/data/arcane/projects/iran:/iran
    commands:
      - cd /iran
      - docker compose up -d --no-deps --force-recreate hamrah-bot
      - docker ps --filter name=hamrah-bot --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'
    depends_on:
      - build
